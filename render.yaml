services:
  - type: web
    name: sendfile
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sendfile-db
          property: connectionString

databases:
  - name: sendfile-db
    databaseName: sendfile
    user: sendfile_user
    plan: free
